name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project (Bundle TSX to JS)
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          npx cap update android

      - name: Sync App Icon
        run: |
          ICON_SRC="public/logo512.png"
          if [ -f "$ICON_SRC" ]; then
            find android/app/src/main/res -name "ic_launcher.png" -exec cp "$ICON_SRC" {} \;
            find android/app/src/main/res -name "ic_launcher_round.png" -exec cp "$ICON_SRC" {} \;
            find android/app/src/main/res -name "ic_launcher_foreground.png" -exec cp "$ICON_SRC" {} \;
          fi

      - name: Get Version from package.json
        id: get_version
        run: |
          # 提取版本信息并设置默认值以防万一
          V_NAME=$(node -e "console.log(require('./package.json').version || '1.0.0')")
          V_CODE=$(node -e "console.log(require('./package.json').versionCode || 1)")
          
          echo "Debug: Extracted Name: $V_NAME"
          echo "Debug: Extracted Code: $V_CODE"
          
          echo "VERSION_NAME=$V_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$V_CODE" >> $GITHUB_OUTPUT

      - name: Force Fix Gradle, AdMob and Apply Manual Versions
        run: |
          cd android
          
          V_NAME="${{ steps.get_version.outputs.VERSION_NAME }}"
          V_CODE="${{ steps.get_version.outputs.VERSION_CODE }}"
          
          echo "Applying to Android: Name=$V_NAME, Code=$V_CODE"
          
          # 修改 app/build.gradle
          if [ -f "app/build.gradle" ]; then
            # 使用 perl 确保替换精准
            perl -i -pe "s/versionCode \d+/versionCode $V_CODE/g" app/build.gradle
            perl -i -pe "s/versionName \".*\"/versionName \"$V_NAME\"/g" app/build.gradle
            
            echo "--- Verify build.gradle Content ---"
            grep "versionCode" app/build.gradle | head -n 1
            grep "versionName" app/build.gradle | head -n 1
          fi
          
          # 1. 物理修改 wrapper
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.10.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # 2. 注入 AdMob APP ID
          MANIFEST="app/src/main/AndroidManifest.xml"
          ADMOB_APP_ID="ca-app-pub-9053893199466734~3107879879"
          if [ -f "$MANIFEST" ]; then
            sed -i "/<\/application>/i \        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$ADMOB_APP_ID\"\/>" $MANIFEST
            sed -i "/<\/manifest>/i \    <uses-permission android:name=\"android.permission.REQUEST_INSTALL_PACKAGES\" />" $MANIFEST
          fi
          
          # 3. 物理修改 root build.gradle 加入 bcprov 强制降级
          cat <<EOF >> build.gradle
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.bouncycastle:bcprov-jdk18on:1.78.1'
                  }
              }
          }
          EOF
          
          # 4. 更新 variables.gradle
          if [ -f "variables.gradle" ]; then
            sed -i "s/minSdkVersion = [0-9]*/minSdkVersion = 23/g" variables.gradle
            sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g" variables.gradle
            sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g" variables.gradle
          fi

          # 5. 编译
          echo "org.gradle.jvmargs=-Xmx3072m" >> gradle.properties
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK
        if: env.HAS_SIGNING_CONFIG == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          $APKSIGNER sign --ks android/app/release-key.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out android/app/build/outputs/apk/debug/app-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          mv android/app/build/outputs/apk/debug/app-signed.apk android/app/build/outputs/apk/debug/app-debug.apk
        env:
          HAS_SIGNING_CONFIG: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Update Release Assets
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
