name: Build Android APK

on:
  # 手動觸發
  workflow_dispatch:
  # 當發佈或更新 Release 時觸發
  release:
    types: [published, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project (Bundle TSX to JS)
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # 強制同步並更新 Android 專案
          npx cap sync android
          npx cap update android

      - name: Sync App Icon (logo512.png to Android)
        run: |
          ICON_SRC="public/logo512.png"
          if [ -f "$ICON_SRC" ]; then
            echo "Syncing $ICON_SRC to Android resources..."
            find android/app/src/main/res -name "ic_launcher.png" -exec cp "$ICON_SRC" {} \;
            find android/app/src/main/res -name "ic_launcher_round.png" -exec cp "$ICON_SRC" {} \;
            find android/app/src/main/res -name "ic_launcher_foreground.png" -exec cp "$ICON_SRC" {} \;
            echo "Icon sync complete."
          else
            echo "Warning: $ICON_SRC not found, skipping icon sync."
          fi

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Sync Version from package.json
        run: |
          VERSION_NAME=${{ steps.get_version.outputs.VERSION }}
          VERSION_CODE=$(date +%s)
          if [ -f "android/app/build.gradle" ]; then
            sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/g" android/app/build.gradle
            sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle
            echo "Synced version $VERSION_NAME ($VERSION_CODE) to Android"
          fi

      - name: Force Fix Gradle and Build
        run: |
          cd android
          # 1. 物理修改 wrapper，確保強制使用 8.10.2 (解決 bcprov 1.79 導致的舊版 Gradle 崩潰)
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.10.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # 2. 核心修復：自動注入 AdMob APP ID 到 AndroidManifest.xml
          MANIFEST="app/src/main/AndroidManifest.xml"
          ADMOB_APP_ID="ca-app-pub-9053893199466734~3107879879"
          if [ -f "$MANIFEST" ]; then
            # 在 </application> 標籤前插入 AdMob 所需的 meta-data
            sed -i "/<\/application>/i \        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$ADMOB_APP_ID\"\/>" $MANIFEST
            echo "AdMob ID injected successfully."
          fi

          # 3. 物理修改 root build.gradle，將 bcprov 降級代碼插入到最前面
          cat <<EOF > fix.gradle
          buildscript {
              configurations.all {
                  resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.78.1'
              }
          }
          allprojects {
              configurations.all {
                  resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.78.1'
              }
          }
          EOF
          cat build.gradle >> fix.gradle
          mv fix.gradle build.gradle

          # 4. 更新 variables.gradle (解決 minSdkVersion 22 與最新 AdMob SDK 衝突)
          if [ -f "variables.gradle" ]; then
            sed -i "s/minSdkVersion = [0-9]*/minSdkVersion = 23/g" variables.gradle
            sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g" variables.gradle
            sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g" variables.gradle
          fi

          # 5. 增加編譯記憶體與消除 SDK 35 警告
          if [ -f "gradle.properties" ]; then
            echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties
          fi
          
          # 6. 執行編譯
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Sign APK
        if: env.HAS_SIGNING_CONFIG == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          $APKSIGNER sign --ks android/app/release-key.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out android/app/build/outputs/apk/debug/app-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk
          mv android/app/build/outputs/apk/debug/app-signed.apk android/app/build/outputs/apk/debug/app-debug.apk
        env:
          HAS_SIGNING_CONFIG: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Update Release Assets
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION || '1.1.0' }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
