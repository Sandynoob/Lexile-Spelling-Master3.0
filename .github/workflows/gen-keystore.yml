# This workflow generates a fixed keystore for Android signing.
name: Generate Fixed Keystore

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias lexile-key \
            -dname "CN=Lexile Master, OU=App, O=Lexile, L=City, S=State, C=CN" \
            -storepass lexile123456 \
            -keypass lexile123456
          
          echo "================================================================"
          echo "COPY THE LINE BELOW (IT IS YOUR ANDROID_KEYSTORE_BASE64):"
          echo "================================================================"
          base64 -w 0 release-key.jks
          echo ""
          echo "================================================================"
          echo "KEYSTORE DETAILS:"
          echo "Password: lexile123456"
          echo "Alias: lexile-key"
          echo "================================================================"
