<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 粘土质感滤镜 -->
    <filter id="clay" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
      <feOffset in="blur" dx="4" dy="8" result="offsetBlur" />
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-50" y="-100" z="200" />
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litGraphic" />
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-opacity="0.2" />
    </filter>
    
    <!-- 渐变色 -->
    <linearGradient id="lexileGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ED62F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78BE20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景：深蓝色圆角矩形 -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)" />

  <!-- 侧边刻度线 (暗示蓝思分级尺) -->
  <g stroke="white" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round">
    <line x1="60" y1="120" x2="90" y2="120" />
    <line x1="60" y1="180" x2="80" y2="180" />
    <line x1="60" y1="240" x2="90" y2="240" />
    <line x1="60" y1="300" x2="80" y2="300" />
    <line x1="60" y1="360" x2="90" y2="360" />
  </g>

  <!-- 声波符号 (右上角) -->
  <g stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-opacity="0.8">
    <path d="M400 100 Q430 130 400 160" />
    <path d="M425 75 Q470 130 425 185" />
  </g>

  <!-- 3D 字母方块：阶梯上升状 -->
  
  <!-- 方块 1: A (左下) -->
  <g filter="url(#clay)" transform="translate(120, 280)">
    <rect width="120" height="120" rx="25" fill="#E2E8F0" />
    <text x="60" y="85" font-family="Arial, sans-serif" font-weight="900" font-size="70" fill="#475569" text-anchor="middle">A</text>
  </g>

  <!-- 方块 2: B (中间，发光状态) -->
  <g filter="url(#clay)" transform="translate(210, 190)">
    <rect width="130" height="130" rx="28" fill="url(#lexileGreen)" />
    <text x="65" y="92" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="white" text-anchor="middle">B</text>
    <!-- 发光描边 -->
    <rect width="130" height="130" rx="28" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.5" />
  </g>

  <!-- 方块 3: L (右上) -->
  <g filter="url(#clay)" transform="translate(310, 100)">
    <rect width="120" height="120" rx="25" fill="#CBD5E1" />
    <text x="60" y="85" font-family="Arial, sans-serif" font-weight="900" font-size="70" fill="#475569" text-anchor="middle">L</text>
  </g>

</svg>
