<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 2025 主流高饱和度渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" /> <!-- Indigo -->
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" /> <!-- Violet -->
    </linearGradient>
  </defs>

  <!-- 背景：超圆角矩形 (Squircle) -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />

  <!-- 火箭符号组 -->
  <g transform="translate(256, 256)">
    
    <!-- 1. 火箭尾焰 (动态感) -->
    <path d="M-40 80 L0 180 L40 80 Z" fill="#FDE047" />
    <path d="M-20 80 L0 140 L20 80 Z" fill="#F59E0B" />

    <!-- 2. 火箭主体 (极简白色) -->
    <path d="M0 -160 C-80 -50 -80 100 0 120 C80 100 80 -50 0 -160 Z" fill="white" />

    <!-- 3. 侧翼 (半透明增加层次) -->
    <path d="M-55 30 L-110 110 L-55 110 Z" fill="white" opacity="0.6" />
    <path d="M55 30 L110 110 L55 110 Z" fill="white" opacity="0.6" />

    <!-- 4. 核心符号：大师之星 (Master Star) -->
    <path d="M0 -45 L10 -15 L40 -15 L15 5 L25 35 L0 15 L-25 35 L-15 5 L-40 -15 L-10 -15 Z" fill="#6366F1" />
  </g>

  <!-- 5. 底部文字：Lexile Spelling Master -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="white" text-anchor="middle" letter-spacing="1">LEXILE SPELLING MASTER</text>
</svg>
